<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Button</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            background: #e9ecef;
            overflow: hidden;
        }

        .app-shell {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iphone-frame {
            width: 375px;
            height: 812px;
            background: #111;
            border-radius: 40px;
            padding: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            position: relative;
            box-sizing: border-box;
        }

        .iphone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            transition: background 0.25s ease;
        }

        .browser-controls {
            position: fixed;
            left: 16px;
            bottom: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .browser-id-label {
            color: #000000;
            font-size: 12px;
            line-height: 1;
            pointer-events: none;
            user-select: none;
        }

        .browser-push-button {
            background: transparent;
            border: none;
            padding: 0;
            color: #0d6efd;
            font-size: 12px;
            font-weight: 400;
            text-decoration: underline;
            cursor: pointer;
            line-height: 1;
        }

        .browser-push-button:hover {
            color: #0a58ca;
        }

        .iphone-screen.active {
            background: #dc3545;
            color: #ffffff;
        }

        .notch {
            width: 160px;
            height: 30px;
            background: #111;
            border-radius: 0 0 20px 20px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .home-view {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sos-button {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #dc3545;
            color: #ffffff;
            border: none;
            font-size: 2rem;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .sos-button:hover {
            background-color: #bb2d3b;
            color: #ffffff;
        }

        .sos-button.active {
            background-color: #ffffff;
            color: #dc3545;
        }

        .sos-button.active:hover {
            background-color: #f8f9fa;
            color: #dc3545;
        }

        .active-view {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 42px 16px 16px;
        }

        .emergency-title {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .recessed-divider {
            height: 2px;
            margin: 0 16px 16px;
            background: rgba(139, 29, 41, 0.6);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08);
            opacity: 1;
        }

        .notifications-panel {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .notifications-panel::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .notification-item {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 12px 14px;
            margin-bottom: 10px;
            backdrop-filter: blur(6px);
        }

        .cancel-button {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            background: #ffffff;
            color: #dc3545;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.12);
        }

        .cancel-button:hover {
            background: #f8f9fa;
            color: #dc3545;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            body {
                background: #ffffff;
            }

            .app-shell {
                min-height: 100dvh;
                align-items: stretch;
                justify-content: stretch;
            }

            .iphone-frame {
                width: 100vw;
                height: 100dvh;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
                background: transparent;
            }

            .iphone-screen {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }

            .notch {
                display: none;
            }

            .active-view {
                padding-top: 24px;
            }

            .browser-push-button {
                display: none;
            }

            .browser-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="browser-controls">
        <div class="browser-id-label">Patient ID: {{ patient_id }}</div>
        <button type="button" class="browser-push-button" id="pushButton">PUSH</button>
    </div>

    <div class="app-shell">
        <div class="iphone-frame">
            <div id="iphoneScreen" class="iphone-screen">
                <div class="notch"></div>

                <div id="homeView" class="home-view">
                    <button type="button" id="sosButton" class="sos-button">SOS</button>
                </div>

                <div id="activeView" class="active-view hidden">
                    <div class="emergency-title">Emergency</div>

                    <div class="recessed-divider"></div>

                    <div class="notifications-panel" id="notificationsPanel"></div>

                    <button type="button" id="cancelButton" class="cancel-button">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
